<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — AhiaGlobal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="shared.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script>tailwind.config={theme:{extend:{fontFamily:{heading:['Plus Jakarta Sans','sans-serif'],body:['Inter','sans-serif']},colors:{primary:{50:'#fff7ed',100:'#ffedd5',200:'#fed7aa',500:'#f97316',600:'#ea580c',700:'#c2410c'},neutral:{50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a'}},boxShadow:{card:'0 4px 14px -3px rgba(15,23,42,.09)',hover:'0 12px 30px -5px rgba(15,23,42,.16)'},rentRadius:{xl2:'0.875rem',xl3:'1.25rem'}}}}</script>
<style>
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(110%)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(110%)}}
.float-anim{animation:float 3s ease-in-out infinite}
.anim-1{animation:fadeUp .55s ease .15s both}
.anim-2{animation:fadeUp .55s ease .3s both}
.anim-3{animation:fadeUp .55s ease .45s both}
.anim-4{animation:fadeUp .55s ease .6s both}
</style>
</head>
<body class="font-body bg-neutral-50 text-neutral-900 min-h-screen flex flex-col">

<div id="toast-stack" class="fixed top-20 right-3 z-[9999] flex flex-col gap-2 w-80 max-w-[calc(100vw-1.5rem)] pointer-events-none"></div>

<!-- HEADER -->
<header class="bg-white border-b border-neutral-200 shadow-sm">
  <div class="max-w-7xl mx-auto px-5 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2">
      <div class="w-9 h-9 bg-primary-600 rounded-lg flex items-center justify-center text-white font-heading font-bold text-lg">A</div>
      <span class="font-heading font-bold text-xl text-neutral-900 tracking-tight">Ahia<span class="text-primary-600">Global</span></span>
    </a>
    <a href="index.html" class="flex items-center gap-2 bg-neutral-900 hover:bg-neutral-800 text-white text-sm font-semibold px-4 py-2.5 rounded-full transition-all">
      <i data-lucide="home" class="w-4 h-4"></i>Back to Home
    </a>
  </div>
</header>

<!-- 404 CONTENT -->
<main class="flex-1 flex items-center justify-center px-5 py-16">
  <div class="max-w-lg w-full text-center">
    <!-- Animated 404 illustration -->
    <div class="float-anim mb-8">
      <svg viewBox="0 0 400 300" class="w-full max-w-sm mx-auto" xmlns="http://www.w3.org/2000/svg">
        <!-- background circle -->
        <circle cx="200" cy="150" r="120" fill="#fff7ed" opacity="0.8"/>
        <!-- 404 text -->
        <text x="200" y="135" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-weight="800" font-size="80" fill="#ea580c" opacity="0.15">404</text>
        <!-- shopping bag -->
        <g transform="translate(140, 80)">
          <rect x="10" y="25" width="100" height="80" rx="10" fill="#ea580c"/>
          <path d="M30 25 C30 5 90 5 90 25" stroke="#c2410c" stroke-width="6" fill="none" stroke-linecap="round"/>
          <!-- face -->
          <circle cx="45" cy="58" r="5" fill="white"/>
          <circle cx="75" cy="58" r="5" fill="white"/>
          <path d="M45 78 Q60 68 75 78" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
          <!-- X eyes (sad) -->
        </g>
        <!-- small search icon -->
        <g transform="translate(280, 60)" opacity="0.4">
          <circle cx="14" cy="14" r="10" stroke="#94a3b8" stroke-width="3" fill="none"/>
          <line x1="21" y1="21" x2="30" y2="30" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
        </g>
        <!-- small stars -->
        <circle cx="80" cy="80" r="4" fill="#fdba74" opacity="0.6"/>
        <circle cx="310" cy="190" r="6" fill="#fdba74" opacity="0.5"/>
        <circle cx="95" cy="210" r="3" fill="#fb923c" opacity="0.4"/>
      </svg>
    </div>

    <div class="anim-1">
      <h1 class="font-heading text-5xl md:text-6xl font-bold text-neutral-900 mb-2">404</h1>
      <h2 class="font-heading text-xl md:text-2xl font-bold text-neutral-700 mb-3">Page Not Found</h2>
    </div>
    <div class="anim-2">
      <p class="text-neutral-500 text-base mb-8 max-w-sm mx-auto leading-relaxed">
        Oops! The page you're looking for seems to have gone shopping. It may have been moved, deleted, or never existed.
      </p>
    </div>

    <!-- Quick links -->
    <div class="anim-3 flex flex-wrap justify-center gap-3 mb-8">
      <a href="index.html" class="flex items-center gap-2 px-6 py-3 bg-primary-600 hover:bg-primary-700 text-white font-semibold rounded-full transition-all shadow-card hover:shadow-hover">
        <i data-lucide="home" class="w-4 h-4"></i>Go Home
      </a>
      <a href="shop.html" class="flex items-center gap-2 px-6 py-3 bg-white hover:bg-neutral-50 text-neutral-900 font-semibold rounded-full border border-neutral-200 transition-all shadow-card">
        <i data-lucide="shopping-bag" class="w-4 h-4"></i>Browse Shop
      </a>
      <a href="faq.html" class="flex items-center gap-2 px-6 py-3 bg-white hover:bg-neutral-50 text-neutral-900 font-semibold rounded-full border border-neutral-200 transition-all shadow-card">
        <i data-lucide="help-circle" class="w-4 h-4"></i>Get Help
      </a>
    </div>

    <!-- Search bar -->
    <div class="anim-4 relative max-w-sm mx-auto mb-8">
      <input type="text" id="error-search" placeholder="Search for what you need…" class="w-full pl-10 pr-4 py-3 bg-white border border-neutral-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 shadow-card">
      <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-neutral-400 w-4 h-4"></i>
      <button onclick="doSearch()" class="absolute right-1.5 top-1/2 -translate-y-1/2 bg-primary-600 hover:bg-primary-700 text-white px-4 py-1.5 rounded-full text-xs font-semibold transition-colors">Search</button>
    </div>

    <!-- Popular pages -->
    <div class="anim-4">
      <p class="text-xs font-bold text-neutral-400 uppercase tracking-widest mb-4">Popular Pages</p>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <a href="index.html" class="bg-white rounded-xl border border-neutral-100 shadow-card p-3.5 flex flex-col items-center gap-2 hover:shadow-hover hover:-translate-y-0.5 transition-all">
          <div class="w-9 h-9 bg-primary-50 rounded-lg flex items-center justify-center"><i data-lucide="home" class="w-4 h-4 text-primary-600"></i></div>
          <span class="text-xs font-semibold text-neutral-700">Home</span>
        </a>
        <a href="shop.html" class="bg-white rounded-xl border border-neutral-100 shadow-card p-3.5 flex flex-col items-center gap-2 hover:shadow-hover hover:-translate-y-0.5 transition-all">
          <div class="w-9 h-9 bg-blue-50 rounded-lg flex items-center justify-center"><i data-lucide="layout-grid" class="w-4 h-4 text-blue-600"></i></div>
          <span class="text-xs font-semibold text-neutral-700">Shop</span>
        </a>
        <a href="account.html" class="bg-white rounded-xl border border-neutral-100 shadow-card p-3.5 flex flex-col items-center gap-2 hover:shadow-hover hover:-translate-y-0.5 transition-all">
          <div class="w-9 h-9 bg-green-50 rounded-lg flex items-center justify-center"><i data-lucide="user" class="w-4 h-4 text-green-600"></i></div>
          <span class="text-xs font-semibold text-neutral-700">Account</span>
        </a>
        <a href="faq.html" class="bg-white rounded-xl border border-neutral-100 shadow-card p-3.5 flex flex-col items-center gap-2 hover:shadow-hover hover:-translate-y-0.5 transition-all">
          <div class="w-9 h-9 bg-amber-50 rounded-lg flex items-center justify-center"><i data-lucide="help-circle" class="w-4 h-4 text-amber-600"></i></div>
          <span class="text-xs font-semibold text-neutral-700">Help</span>
        </a>
      </div>
    </div>
  </div>
</main>

<footer class="bg-white border-t border-neutral-100 py-6">
  <div class="max-w-7xl mx-auto px-5 text-center text-xs text-neutral-400">
    © 2024 AhiaGlobal. All rights reserved. · <a href="faq.html" class="hover:text-primary-600">Help Center</a> · <a href="index.html" class="hover:text-primary-600">Back to Home</a>
  </div>
</footer>

<script src="shared.js"></script>
<script>
function doSearch() {
  const q = document.getElementById('error-search')?.value?.trim();
  if (q) window.location.href = `shop.html?q=${encodeURIComponent(q)}`;
}
document.getElementById('error-search')?.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
</script>
</body>
</html>
